name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'

    - name: Create Fake Files
      run: |
        touch LiveSplit.AutoSplitters.xml
        touch LiveSplit.HollowKnight.dll
        rm -f userdefined/*
        touch userdefined/1.lss
        mkdir -p frontend/dist
        touch frontend/dist/1

    - name: Set Go Env
      run: |
        go env -w GOOS=windows
        go env -w GOARCH=amd64

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

    - name: Build
      run: go build -v ./...
